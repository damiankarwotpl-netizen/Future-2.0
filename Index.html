<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel pracownika</title>
  <style>
    :root{
      --bg:#f3f6ff;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --primary:#4f46e5;
      --primary-2:#4338ca;
      --border:#dbe4ff;
      --ok:#047857;
      --err:#b91c1c;
      --shadow:0 10px 28px rgba(44,62,120,.08);
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at top right, #dbe4ff 0%, transparent 40%),
        radial-gradient(circle at top left, #eef2ff 0%, transparent 45%),
        var(--bg);
    }
    .container{max-width:900px;margin:28px auto;padding:0 14px 28px}
    .hero{margin-bottom:16px}
    .hero h1{margin:0 0 6px;font-size:1.5rem}
    .hero p{margin:0;color:var(--muted)}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
    .section-title{margin:0 0 12px;font-size:1.05rem}
    .section-sub{margin:0 0 14px;color:var(--muted);font-size:.92rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{display:block;font-size:.86rem;color:#334155;margin-bottom:6px;font-weight:600}
    input{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 11px;background:#fff}
    input:focus{outline:none;border-color:#8da2fb;box-shadow:0 0 0 3px #e0e7ff}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .btn{border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700;color:#fff;background:linear-gradient(180deg,var(--primary),var(--primary-2));box-shadow:0 6px 16px rgba(79,70,229,.24)}
    .status{margin-top:10px;font-weight:700;padding:8px 10px;border-radius:9px;display:inline-block;min-height:36px;background:#f8fafc;border:1px solid #e2e8f0}
    .ok{color:var(--ok);background:#ecfdf5;border-color:#a7f3d0}
    .err{color:var(--err);background:#fef2f2;border-color:#fecaca}
    .admin-link{display:inline-block;margin-top:4px;color:#4338ca;text-decoration:none;font-weight:600}
    .admin-link:hover{text-decoration:underline}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.row .btn{width:100%}}
  </style>
</head>
<body>
<div class="container">
  <header class="hero">
    <h1>Formularz pracownika</h1>
    <p>Uzupełnij dane identyfikacyjne, aby rozpocząć formularz.</p>
  </header>

  <section class="card">
    <h3 class="section-title">Logowanie pracownika</h3>
    <p class="section-sub">Panel administratora jest dostępny pod osobnym linkiem.</p>
    <div class="grid">
      <div><label>Imię</label><input id="loginName"></div>
      <div><label>Nazwisko</label><input id="loginSurname"></div>
      <div><label>PESEL</label><input id="loginPesel" maxlength="11"></div>
      <div><label>Zakład</label><input id="loginPlant"></div>
    </div>
    <div class="row"><button class="btn" id="loginBtn">Zaloguj</button></div>
    <div id="loginStatus" class="status"></div>
    <a class="admin-link" href="?page=admin">Przejdź do panelu administratora</a>
  </section>
</div>

<script>
  function setStatus(id,msg,cls=''){const e=document.getElementById(id);e.className='status '+cls;e.textContent=msg||'';}

  document.getElementById('loginBtn').onclick = () => {
    google.script.run
      .withSuccessHandler(()=>setStatus('loginStatus','OK','ok'))
      .withFailureHandler(err=>setStatus('loginStatus','Błąd: '+err.message,'err'))
      .loginByIdentity({
        name:document.getElementById('loginName').value.trim(),
        surname:document.getElementById('loginSurname').value.trim(),
        pesel:document.getElementById('loginPesel').value.trim(),
        plant:document.getElementById('loginPlant').value.trim()
      });
  };
</script>
</body>
</html>
