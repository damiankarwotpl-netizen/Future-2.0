<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel administratora</title>
  <style>
    :root{--bg:#f3f6ff;--card:#fff;--text:#0f172a;--muted:#64748b;--primary:#4f46e5;--primary-2:#4338ca;--border:#dbe4ff;--ok:#047857;--err:#b91c1c;--shadow:0 10px 28px rgba(44,62,120,.08)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:var(--bg)}
    .container{max-width:1300px;margin:28px auto;padding:0 14px 28px}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;box-shadow:var(--shadow);padding:16px;margin-bottom:14px}
    .section-title{margin:0 0 12px;font-size:1.05rem}
    .section-sub{margin:0 0 14px;color:var(--muted);font-size:.92rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    label{display:block;font-size:.86rem;color:#334155;margin-bottom:6px;font-weight:600}
    input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 11px;background:#fff}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .btn{border:none;border-radius:10px;padding:10px 14px;cursor:pointer;font-weight:700;color:#fff;background:linear-gradient(180deg,var(--primary),var(--primary-2));box-shadow:0 6px 16px rgba(79,70,229,.24)}
    .btn.secondary{background:#eef2ff;color:#3730a3;box-shadow:none}
    .status{margin-top:10px;font-weight:700;padding:8px 10px;border-radius:9px;display:inline-block;min-height:36px;background:#f8fafc;border:1px solid #e2e8f0}
    .ok{color:var(--ok);background:#ecfdf5;border-color:#a7f3d0}.err{color:var(--err);background:#fef2f2;border-color:#fecaca}
    .hidden{display:none}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #e2e8f0;padding:6px;text-align:left;font-size:.86rem;vertical-align:top;white-space:nowrap}
    th{background:#f8fafc;position:sticky;top:0;z-index:2}
    .divider{height:1px;background:#e2e8f0;margin:14px 0}
    .link{color:#4338ca;text-decoration:none;font-weight:600}
    .head-cell{min-width:180px}
    .map-select{margin-top:6px;font-size:.8rem;padding:6px}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.row .btn{width:100%}}
  </style>
</head>
<body>
<div class="container">
  <section class="card" id="adminAuthCard">
    <h3 class="section-title">Logowanie administratora</h3>
    <p class="section-sub">Aby otworzyć panel importu, zaloguj się loginem i hasłem.</p>
    <div class="grid">
      <div><label>Login</label><input id="adminLogin"></div>
      <div><label>Hasło</label><input id="adminPassword" type="password"></div>
    </div>
    <div class="row"><button class="btn" id="adminAuthBtn">Zaloguj do panelu admin</button></div>
    <div id="adminAuthStatus" class="status"></div>
    <div style="margin-top:10px"><a class="link" href="?">← Wróć do panelu pracownika</a></div>
  </section>

  <div id="adminApp" class="hidden">
    <?!= include('AdminPanel'); ?>
  </div>
</div>

<script>
  let adminToken = null;
  let convertedSpreadsheetId = null;
  let header = [];
  let rows = [];
  let allowedFields = [];
  let mapping = {};
  let selectedRows = new Set();
  let selectedColumns = new Set();

  function setStatus(id,msg,cls=''){const e=document.getElementById(id);e.className='status '+cls;e.textContent=msg||'';}

  function requireAdmin(){
    if (!adminToken) {
      setStatus('adminAuthStatus','Najpierw zaloguj się jako administrator.','err');
      return false;
    }
    return true;
  }

  function renderGrid(){
    const body = document.getElementById('previewBody');
    body.innerHTML = '';
    if (!header.length) return;

    const trHead = document.createElement('tr');
    trHead.innerHTML = '<th><input type="checkbox" id="allRowsChk" checked></th><th>#</th>';

    header.forEach(h => {
      const th = document.createElement('th');
      th.className = 'head-cell';

      const chk = document.createElement('input');
      chk.type = 'checkbox';
      chk.checked = selectedColumns.has(h);
      chk.onchange = () => {
        if (chk.checked) selectedColumns.add(h); else selectedColumns.delete(h);
      };

      const title = document.createElement('div');
      title.textContent = h;

      const mapSel = document.createElement('select');
      mapSel.className = 'map-select';
      allowedFields.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f;
        if ((mapping[h] || '__SKIP__') === f) opt.selected = true;
        mapSel.appendChild(opt);
      });
      mapSel.onchange = () => mapping[h] = mapSel.value;

      th.appendChild(chk);
      th.appendChild(title);
      th.appendChild(mapSel);
      trHead.appendChild(th);
    });

    body.appendChild(trHead);

    rows.forEach(r => {
      const tr = document.createElement('tr');

      const tdChk = document.createElement('td');
      const rowChk = document.createElement('input');
      rowChk.type = 'checkbox';
      rowChk.checked = selectedRows.has(r.rowNumber);
      rowChk.onchange = () => {
        if (rowChk.checked) selectedRows.add(r.rowNumber); else selectedRows.delete(r.rowNumber);
      };
      tdChk.appendChild(rowChk);

      const tdNum = document.createElement('td');
      tdNum.textContent = r.rowNumber;

      tr.appendChild(tdChk);
      tr.appendChild(tdNum);

      r.rowValues.forEach(v => {
        const td = document.createElement('td');
        td.textContent = v == null ? '' : String(v);
        tr.appendChild(td);
      });

      body.appendChild(tr);
    });

    document.getElementById('allRowsChk').onchange = (e) => {
      if (e.target.checked) rows.forEach(r=>selectedRows.add(r.rowNumber));
      else selectedRows.clear();
      renderGrid();
    };

    document.getElementById('previewWrap').classList.remove('hidden');
  }

  document.getElementById('adminAuthBtn').onclick = () => {
    google.script.run
      .withSuccessHandler(res => {
        adminToken = res.token;
        setStatus('adminAuthStatus','Autoryzacja poprawna.','ok');
        document.getElementById('adminApp').classList.remove('hidden');
      })
      .withFailureHandler(err=>setStatus('adminAuthStatus','Błąd logowania: '+err.message,'err'))
      .adminLogin(
        document.getElementById('adminLogin').value.trim(),
        document.getElementById('adminPassword').value
      );
  };

  document.getElementById('loadSheetsBtn').onclick = () => {
    if (!requireAdmin()) return;
    google.script.run
      .withSuccessHandler(res=>{
        convertedSpreadsheetId = res.convertedSpreadsheetId;
        const sel = document.getElementById('excelSheetName');
        sel.innerHTML = '';
        res.sheetNames.forEach(n => {
          const o = document.createElement('option'); o.value=n; o.textContent=n; sel.appendChild(o);
        });
        setStatus('importStatus','Arkusze wczytane. Wybierz arkusz i kliknij „Zbuduj widok danych”.','ok');
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd: '+err.message,'err'))
      .adminListExcelSheets(adminToken, document.getElementById('excelFileId').value.trim());
  };

  document.getElementById('buildGridBtn').onclick = () => {
    if (!requireAdmin()) return;
    if (!convertedSpreadsheetId) return setStatus('importStatus','Najpierw wczytaj arkusze.','err');

    const targetTable = document.getElementById('targetTable').value;
    const sheetName = document.getElementById('excelSheetName').value;

    google.script.run
      .withSuccessHandler(mapRes => {
        allowedFields = mapRes.allowedFields;
        mapping = mapRes.suggestedMapping;

        google.script.run
          .withSuccessHandler(previewRes => {
            header = previewRes.header;
            rows = previewRes.rows;
            selectedRows = new Set(rows.map(r => r.rowNumber));
            selectedColumns = new Set(header);
            setStatus('importStatus',`Załadowano ${rows.length} wierszy i ${header.length} kolumn.`, 'ok');
            renderGrid();
          })
          .withFailureHandler(err=>setStatus('importStatus','Błąd podglądu: '+err.message,'err'))
          .adminPreviewExcel(adminToken, convertedSpreadsheetId, sheetName);
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd mapowania: '+err.message,'err'))
      .adminSuggestMapping(adminToken, convertedSpreadsheetId, sheetName, targetTable);
  };

  document.getElementById('importBtn').onclick = () => {
    if (!requireAdmin()) return;
    if (!convertedSpreadsheetId || !header.length) return setStatus('importStatus','Najpierw zbuduj widok danych.','err');

    const chosenRows = [...selectedRows];
    const chosenCols = [...selectedColumns];
    if (!chosenRows.length) return setStatus('importStatus','Wybierz co najmniej 1 wiersz.','err');
    if (!chosenCols.length) return setStatus('importStatus','Wybierz co najmniej 1 kolumnę.','err');

    google.script.run
      .withSuccessHandler(res=>setStatus('importStatus',`Zaimportowano ${res.imported} wierszy.`, 'ok'))
      .withFailureHandler(err=>setStatus('importStatus','Błąd importu: '+err.message,'err'))
      .adminImportWithFieldSelection(adminToken, {
        convertedSpreadsheetId,
        sheetName: document.getElementById('excelSheetName').value,
        targetTable: document.getElementById('targetTable').value,
        mapping,
        selectedRows: chosenRows,
        selectedColumns: chosenCols
      });
  };
</script>
</body>
</html>
