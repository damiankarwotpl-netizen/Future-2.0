<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Panel administratora</title>
  <style>
    :root{--bg:#eef2ff;--card:#fff;--text:#0f172a;--muted:#64748b;--primary:#4f46e5;--primary-2:#3730a3;--border:#dbe4ff;--ok:#047857;--err:#b91c1c;--shadow:0 14px 36px rgba(30,41,90,.12)}
    *{box-sizing:border-box}
    body{margin:0;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;color:var(--text);background:radial-gradient(circle at top right,#c7d2fe 0%,transparent 36%),radial-gradient(circle at top left,#e0e7ff 0%,transparent 44%),var(--bg);min-height:100vh}
    .container{max-width:1140px;margin:30px auto;padding:0 16px 32px}
    .hero{margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
    .hero h1{margin:0 0 6px;font-size:1.65rem}
    .hero p{margin:0;color:var(--muted)}
    .hero-badge{display:inline-flex;align-items:center;gap:8px;padding:8px 12px;border-radius:999px;background:#e0e7ff;border:1px solid #c7d2fe;color:#3730a3;font-weight:700;font-size:.82rem}
    .card{background:var(--card);border:1px solid var(--border);border-radius:18px;box-shadow:var(--shadow);padding:18px;margin-bottom:14px}
    .card:hover{transform:translateY(-1px);transition:.2s ease}
    .section-title{margin:0 0 12px;font-size:1.05rem}
    .section-sub{margin:0 0 14px;color:var(--muted);font-size:.92rem}
    .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .full{grid-column:1/-1}
    label{display:block;font-size:.86rem;color:#334155;margin-bottom:6px;font-weight:600}
    input,textarea,select{width:100%;border:1px solid #cbd5e1;border-radius:10px;padding:10px 11px;background:#fff}
    textarea{min-height:120px}
    .row{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
    .btn{border:none;border-radius:12px;padding:11px 16px;cursor:pointer;font-weight:700;color:#fff;background:linear-gradient(180deg,var(--primary),var(--primary-2));box-shadow:0 10px 18px rgba(79,70,229,.24)}
    .btn:hover{filter:brightness(1.03)}
    .btn.secondary{background:#eef2ff;color:#3730a3;box-shadow:none}
    .status{margin-top:10px;font-weight:700;padding:8px 10px;border-radius:9px;display:inline-block;min-height:36px;background:#f8fafc;border:1px solid #e2e8f0}
    .ok{color:var(--ok);background:#ecfdf5;border-color:#a7f3d0}.err{color:var(--err);background:#fef2f2;border-color:#fecaca}
    .hidden{display:none}
    table{width:100%;border-collapse:collapse}
    th,td{border:1px solid #e2e8f0;padding:8px;text-align:left}
    th{background:#f8fafc}
    .divider{height:1px;background:#e2e8f0;margin:14px 0}
    .link{color:#4338ca;text-decoration:none;font-weight:600}
    .live-badge{display:inline-flex;align-items:center;padding:8px 12px;border-radius:999px;font-size:.82rem;font-weight:700;background:#ecfeff;color:#155e75;border:1px solid #a5f3fc}
    .stats-summary{margin-top:12px;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:10px}
    .kpi{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:10px 12px}
    .kpi .label{font-size:.8rem;color:#64748b}
    .kpi .value{font-size:1.3rem;font-weight:800;color:#1e1b4b}
    .stats-layout{display:grid;grid-template-columns:2fr 1fr;gap:10px;margin-top:10px}
    .stats-chart-wrap{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:8px}
    .card-soft{background:#f8fafc;border:1px solid #e2e8f0;border-radius:12px;padding:12px}
    #missingPeselList{margin:8px 0 0;padding-left:18px;max-height:280px;overflow:auto}
    .stats-table{margin-top:10px}
    .plant-link{background:none;border:none;color:#4338ca;font-weight:700;cursor:pointer;padding:0}
    .plant-link:hover{text-decoration:underline}
    .progress-pill{display:inline-block;border-radius:999px;padding:4px 8px;background:#eef2ff;color:#3730a3;font-weight:700}
    @media(max-width:900px){.grid{grid-template-columns:1fr}.row .btn{width:100%}}
    @media(max-width:900px){.stats-layout{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="container">
  <header class="hero">
    <div>
      <h1>Panel administratora</h1>
      <p>Zarządzaj listami, pracownikami i statystykami w jednym miejscu.</p>
    </div>
    <div class="hero-badge">Tryb administracyjny • LIVE</div>
  </header>
  <section class="card">
    <h3 class="section-title">Logowanie administratora</h3>
    <p class="section-sub">Zaloguj się, aby zarządzać listami PESEL / Zakład / Mieszkanie.</p>
    <div class="grid">
      <div><label>Login</label><input id="adminLogin"></div>
      <div><label>Hasło</label><input id="adminPassword" type="password"></div>
    </div>
    <div class="row"><button class="btn" id="adminAuthBtn">Zaloguj do panelu admin</button></div>
    <div id="adminAuthStatus" class="status"></div>
    <div style="margin-top:10px"><a class="link" href="<?= homeUrl ?>">← Wróć do panelu pracownika</a></div>
  </section>

  <div id="adminApp" class="hidden">
    <?!= include('AdminPanel'); ?>
  </div>
</div>

<script>
  let adminToken = null;
  let currentEmployeeKey = null;
  let statsPollHandle = null;
  function setStatus(id,msg,cls=''){const e=document.getElementById(id);e.className='status '+cls;e.textContent=msg||'';}
  function requireAdmin(){ if (!adminToken) { setStatus('adminAuthStatus','Najpierw zaloguj się jako administrator.','err'); return false; } return true; }
  function setSelectOptions(selectId, values, selectedValue = '') {
    const el = document.getElementById(selectId);
    if (!el) return;
    el.innerHTML = '';
    values.forEach(v => {
      const opt = document.createElement('option');
      opt.value = v;
      opt.textContent = v;
      el.appendChild(opt);
    });
    if (selectedValue && values.includes(selectedValue)) el.value = selectedValue;
  }
  function parsePhone(phoneRaw = '') {
    const raw = String(phoneRaw || '').trim();
    if (raw.startsWith('+57')) return { prefix:'+57', number:raw.replace('+57','').trim() };
    if (raw.startsWith('+48')) return { prefix:'+48', number:raw.replace('+48','').trim() };
    return { prefix:'+48', number:raw };
  }
  function setEditIntlDrivingVisibility() {
    const show = document.getElementById('edit_intlDrivingLicense').value === 'tak';
    document.getElementById('editIntlDrivingExpiryWrap').classList.toggle('hidden', !show);
  }

  function refreshCoreLists(){
    if (!requireAdmin()) return;
    google.script.run
      .withSuccessHandler(res => {
        const plantSelects = [document.getElementById('peselAssignPlant'), document.getElementById('plantRemoveSelect')];
        plantSelects.forEach(sel => {
          sel.innerHTML = '<option value=>-- wybierz --</option>';
          res.plants.forEach(p => {
            const o = document.createElement('option');
            o.value = p;
            o.textContent = p;
            sel.appendChild(o);
          });
        });

        const aptSel = document.getElementById('apartmentRemoveSelect');
        aptSel.innerHTML = '<option value=>-- wybierz --</option>';
        res.apartments.forEach(a => {
          const o = document.createElement('option');
          o.value = a;
          o.textContent = a;
          aptSel.appendChild(o);
        });

        const peselSel = document.getElementById('peselRemoveSelect');
        peselSel.innerHTML = '<option value=>-- wybierz --</option>';
        res.peselOptions.forEach(item => {
          const o = document.createElement('option');
          o.value = item.value;
          o.textContent = item.label;
          peselSel.appendChild(o);
        });

        setSelectOptions('edit_plant', res.plants);
        setSelectOptions('edit_apartment', res.apartments);
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd odświeżania list: '+err.message,'err'))
      .adminGetCoreLists(adminToken);
  }

  document.getElementById('adminAuthBtn').onclick = () => {
    google.script.run
      .withSuccessHandler(res => {
        adminToken = res.token;
        setStatus('adminAuthStatus','Autoryzacja poprawna.','ok');
        document.getElementById('adminApp').classList.remove('hidden');
        refreshCoreLists();
        loadStats(true);
        startStatsRealtime();
      })
      .withFailureHandler(err=>setStatus('adminAuthStatus','Błąd logowania: '+err.message,'err'))
      .adminLogin(document.getElementById('adminLogin').value.trim(), document.getElementById('adminPassword').value);
  };

  document.getElementById('saveListsBtn').onclick = () => {
    if (!requireAdmin()) return;

    google.script.run
      .withSuccessHandler(res => {
        setStatus('importStatus', `Zapisano: PESEL ${res.pesels}, Zakład ${res.plants}, Mieszkanie ${res.apartments}.`, 'ok');
        loadStats(true);
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd zapisu list: '+err.message,'err'))
      .adminSaveCoreLists(adminToken, {
        pesels: document.getElementById('peselBulk').value,
        plants: document.getElementById('plantBulk').value,
        apartments: document.getElementById('apartmentBulk').value,
        selectedPlant: document.getElementById('peselAssignPlant').value
      });
  };


  document.getElementById('refreshListsBtn').onclick = () => {
    refreshCoreLists();
  };

  document.getElementById('removeListsBtn').onclick = () => {
    if (!requireAdmin()) return;

    google.script.run
      .withSuccessHandler(() => {
        setStatus('importStatus', 'Usunięto wskazane wartości z list.', 'ok');
        loadStats(true);
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd usuwania z list: '+err.message,'err'))
      .adminRemoveFromLists(adminToken, {
        peselKey: document.getElementById('peselRemoveSelect').value,
        plant: document.getElementById('plantRemoveSelect').value,
        apartment: document.getElementById('apartmentRemoveSelect').value
      });
  };

  document.getElementById('refreshEmployeesBtn').onclick = () => {
    if (!requireAdmin()) return;

    google.script.run
      .withSuccessHandler(rows => {
        const sel = document.getElementById('employeeSelect');
        sel.innerHTML = '';
        rows.forEach(r => {
          const o = document.createElement('option');
          o.value = JSON.stringify({pesel:r.pesel, plant:r.plant});
          o.textContent = `${r.surname} ${r.name} | ${r.pesel} | ${r.plant}`;
          sel.appendChild(o);
        });
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd pobierania pracowników: '+err.message,'err'))
      .adminListCompletedEmployees(adminToken);
  };


  document.getElementById('employeeSearch').addEventListener('input', e => {
    const q = (e.target.value || '').toLowerCase();
    const sel = document.getElementById('employeeSelect');
    [...sel.options].forEach(o => {
      o.hidden = q && !o.textContent.toLowerCase().includes(q);
    });
  });

  document.getElementById('loadEmployeeBtn').onclick = () => {
    if (!requireAdmin()) return;
    const raw = document.getElementById('employeeSelect').value;
    if (!raw) return;
    const key = JSON.parse(raw);
    currentEmployeeKey = key;

    google.script.run
      .withSuccessHandler(emp => {
        const phone = parsePhone(emp.phone || '');
        Object.keys(emp).forEach(k => {
          const el = document.getElementById(`edit_${k}`);
          if (el) { el.value = emp[k] || ''; el.defaultValue = emp[k] || ''; }
        });
        document.getElementById('edit_phonePrefix').value = phone.prefix;
        document.getElementById('edit_phoneNumber').value = phone.number;
        document.getElementById('edit_phonePrefix').defaultValue = phone.prefix;
        document.getElementById('edit_phoneNumber').defaultValue = phone.number;
        setEditIntlDrivingVisibility();
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd wczytywania pracownika: '+err.message,'err'))
      .adminGetEmployeeForEdit(adminToken, key.pesel, key.plant);
  };

  document.getElementById('saveEmployeeBtn').onclick = () => {
    if (!requireAdmin()) return;

    const payload = {};
    [
      'name','surname','pesel','plant','apartment','email','bankAccount','birthDate','passportNumber','passportExpiry',
      'arrivalDate','firstWorkDate','intlDrivingLicense','intlDrivingLicenseExpiry','shirt','hoodie','pants','jacket','shoes','notes'
    ].forEach(k => {
      const el = document.getElementById(`edit_${k}`);
      payload[k] = el ? el.value : '';
    });
    payload.phone = `${document.getElementById('edit_phonePrefix').value} ${document.getElementById('edit_phoneNumber').value.trim()}`.trim();
    payload.oldPesel = currentEmployeeKey ? currentEmployeeKey.pesel : '';
    payload.oldPlant = currentEmployeeKey ? currentEmployeeKey.plant : '';
    payload.oldName = document.getElementById('edit_name').defaultValue || '';
    payload.oldSurname = document.getElementById('edit_surname').defaultValue || '';

    google.script.run
      .withSuccessHandler(() => setStatus('importStatus', 'Zapisano zmiany pracownika.', 'ok'))
      .withFailureHandler(err=>setStatus('importStatus','Błąd zapisu pracownika: '+err.message,'err'))
      .adminSaveEmployeeByAdmin(adminToken, payload);
  };

  function renderStats(rows) {
    const body = document.getElementById('statsBody');
    body.innerHTML = '';
    rows.forEach(r => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td><button class="plant-link" data-plant="${r.plant}">${r.plant}</button></td>
        <td>${r.completed}</td>
        <td>${r.remaining}</td>
        <td>${r.total}</td>
        <td><span class="progress-pill">${r.percent}%</span></td>
      `;
      body.appendChild(tr);
    });

    const completed = rows.reduce((a, r) => a + r.completed, 0);
    const total = rows.reduce((a, r) => a + r.total, 0);
    const remaining = rows.reduce((a, r) => a + r.remaining, 0);
    const percent = total ? Math.round((completed / total) * 100) : 0;
    document.getElementById('statsSummary').innerHTML = `
      <div class="kpi"><div class="label">Wypełnione</div><div class="value">${completed}</div></div>
      <div class="kpi"><div class="label">Brakuje</div><div class="value">${remaining}</div></div>
      <div class="kpi"><div class="label">Wszystkie osoby</div><div class="value">${total}</div></div>
      <div class="kpi"><div class="label">Łączny postęp</div><div class="value">${percent}%</div></div>
    `;
    drawStatsChart(rows);
  }

  function drawStatsChart(rows) {
    const canvas = document.getElementById('statsChart');
    if (!canvas) return;
    const parentWidth = canvas.parentElement.clientWidth - 20;
    canvas.width = Math.max(520, parentWidth);
    const ctx = canvas.getContext('2d');
    const w = canvas.width;
    const h = canvas.height;
    ctx.clearRect(0, 0, w, h);
    ctx.fillStyle = '#f8fafc';
    ctx.fillRect(0, 0, w, h);
    if (!rows.length) return;

    const chartTop = 24;
    const chartBottom = h - 54;
    const chartHeight = chartBottom - chartTop;
    const maxTotal = Math.max(...rows.map(r => r.total), 1);
    const barSpace = (w - 40) / rows.length;
    const barW = Math.max(28, barSpace * 0.42);

    rows.forEach((r, i) => {
      const x = 20 + i * barSpace + (barSpace - barW) / 2;
      const doneH = (r.completed / maxTotal) * chartHeight;
      const remainH = (r.remaining / maxTotal) * chartHeight;
      const yDone = chartBottom - doneH;
      const yRemain = yDone - remainH;

      ctx.fillStyle = '#e2e8f0';
      ctx.fillRect(x, chartTop, barW, chartHeight);
      ctx.fillStyle = '#22c55e';
      ctx.fillRect(x, yDone, barW, doneH);
      ctx.fillStyle = '#f97316';
      ctx.fillRect(x, yRemain, barW, remainH);

      ctx.fillStyle = '#0f172a';
      ctx.font = '12px Inter, Arial';
      ctx.textAlign = 'center';
      ctx.fillText(r.plant, x + barW / 2, h - 32);
      ctx.fillText(`${r.completed}/${r.total}`, x + barW / 2, h - 16);
    });
  }

  function loadStats(silent = false) {
    if (!requireAdmin()) return;
    google.script.run
      .withSuccessHandler(rows => {
        renderStats(rows);
        document.getElementById('statsLiveBadge').textContent = `LIVE: ostatnia aktualizacja ${new Date().toLocaleTimeString('pl-PL')}`;
      })
      .withFailureHandler(err => !silent && setStatus('importStatus','Błąd statystyk: '+err.message,'err'))
      .getAdminStats(adminToken);
  }

  function startStatsRealtime() {
    if (statsPollHandle) clearInterval(statsPollHandle);
    statsPollHandle = setInterval(() => {
      if (!document.hidden) loadStats(true);
    }, 10000);
  }

  function showMissingPesels(plant) {
    if (!requireAdmin()) return;
    google.script.run
      .withSuccessHandler(rows => {
        document.getElementById('missingListTitle').textContent = `Brakujące PESEL dla zakładu: ${plant} (${rows.length})`;
        const list = document.getElementById('missingPeselList');
        list.innerHTML = rows.length ? rows.map(p => `<li>${p}</li>`).join('') : '<li>Wszyscy mają już wypełniony formularz.</li>';
      })
      .withFailureHandler(err => setStatus('importStatus','Błąd pobierania brakujących PESEL: '+err.message,'err'))
      .getAdminMissingByPlant(adminToken, plant);
  }

  document.getElementById('refreshStatsBtn').onclick = () => loadStats(false);
  document.getElementById('edit_intlDrivingLicense').addEventListener('change', setEditIntlDrivingVisibility);
  setEditIntlDrivingVisibility();
  document.getElementById('statsBody').addEventListener('click', e => {
    const btn = e.target.closest('.plant-link');
    if (!btn) return;
    showMissingPesels(btn.dataset.plant || '');
  });

  document.getElementById('generateTestDbBtn').onclick = () => {
    if (!requireAdmin()) return;

    google.script.run
      .withSuccessHandler(res=>{
        setStatus('importStatus', `Wygenerowano bazę testową: ${res.generated} pracowników.`, 'ok');
        loadStats(true);
      })
      .withFailureHandler(err=>setStatus('importStatus','Błąd generowania bazy testowej: '+err.message,'err'))
      .adminGenerateTestDatabase(adminToken);
  };
</script>
</body>
</html>
